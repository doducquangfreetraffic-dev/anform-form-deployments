<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Bế Giảng HBCompro 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fcfaf8;
    color: #1a1a1a;
    line-height: 1.55;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  img { max-width: 100%; display: block; }

  /* ===== Layout ===== */
  .wrap {
    max-width: 640px;
    margin: 0 auto;
    background: #fcfaf8;
    min-height: 100vh;
  }

  /* ===== Hero ===== */
  .hero {
    position: relative;
    width: 100%;
    overflow: hidden;
    background: #e9eee7;
  }
  .hero-img {
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 28px 22px;
    color: #fff;
  }
  .hero-overlay h1 {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 8px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .hero-overlay p {
    font-size: 15px;
    font-weight: 500;
    opacity: 0.95;
    text-shadow: 0 1px 8px rgba(0,0,0,0.4);
  }

  @media (min-width: 641px) {
    .hero-img { aspect-ratio: 16/9; }
    .hero-overlay { padding: 40px 36px; }
    .hero-overlay h1 { font-size: 36px; }
    .hero-overlay p { font-size: 17px; }
  }

  /* ===== Content ===== */
  .content { padding: 24px 20px 40px; }

  section { margin-bottom: 24px; }

  .section-title {
    font-size: 18px;
    font-weight: 600;
    color: #4a6741;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 4px;
    height: 18px;
    background: #6b8f5e;
    border-radius: 2px;
  }

  /* ===== Sessions ===== */
  .session-card {
    background: #e9eee7;
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .session-card:hover { border-color: #c8b89a; }
  .session-card.active {
    border-color: #6b8f5e;
    background: #fcfaf8;
    box-shadow: 0 2px 12px rgba(107,143,94,0.15);
  }
  .session-check {
    width: 22px;
    height: 22px;
    border: 2px solid #6b8f5e;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fcfaf8;
    margin-top: 2px;
  }
  .session-card.active .session-check {
    background: #6b8f5e;
  }
  .session-card.active .session-check::after {
    content: '✓';
    color: #fff;
    font-weight: 700;
    font-size: 14px;
  }
  .session-info { flex: 1; }
  .session-title {
    font-weight: 600;
    font-size: 16px;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .session-meta {
    font-size: 13px;
    color: #666666;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 12px;
  }
  .session-badge {
    display: inline-block;
    background: #c8b89a;
    color: #1a1a1a;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    margin-bottom: 8px;
  }

  /* ===== Form ===== */
  .field { margin-bottom: 16px; position: relative; }
  .field label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .field label .req { color: #4a6741; }

  .field input[type="text"],
  .field input[type="email"],
  .field input[type="tel"] {
    width: 100%;
    height: 52px;
    padding: 0 16px;
    font-size: 16px;
    font-family: inherit;
    border: 1.5px solid #c8b89a;
    border-radius: 12px;
    background: #fcfaf8;
    color: #1a1a1a;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .field input:focus {
    border-color: #6b8f5e;
    box-shadow: 0 0 0 3px rgba(107,143,94,0.15);
  }

  /* Autocomplete dropdown */
  .ac-list {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #fcfaf8;
    border: 1.5px solid #c8b89a;
    border-radius: 12px;
    margin-top: 4px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 50;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    display: none;
  }
  .ac-list.show { display: block; }
  .ac-item {
    padding: 10px 14px;
    font-size: 14px;
    cursor: pointer;
    border-bottom: 1px solid #e9eee7;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.active { background: #e9eee7; }
  .ac-item strong { color: #4a6741; font-weight: 600; }
  .ac-item small { color: #666666; display: block; margin-top: 2px; font-size: 12px; }

  /* Checkbox */
  .check-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 14px;
    background: #e9eee7;
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 18px;
  }
  .check-row input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: #6b8f5e;
    flex-shrink: 0;
    margin-top: 1px;
    cursor: pointer;
  }
  .check-row span {
    font-size: 14px;
    color: #1a1a1a;
    line-height: 1.5;
  }

  /* Button */
  .btn {
    width: 100%;
    height: 56px;
    background: #6b8f5e;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    -webkit-appearance: none;
  }
  .btn:hover:not(:disabled) { background: #4a6741; }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* Error */
  .err {
    background: #fcfaf8;
    border: 1.5px solid #c8b89a;
    color: #4a6741;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 14px;
    display: none;
  }
  .err.show { display: block; }

  /* Organizer / header text below hero */
  .lead {
    background: #e9eee7;
    padding: 14px 16px;
    border-radius: 12px;
    margin-bottom: 22px;
    font-size: 14px;
    color: #666666;
    border-left: 3px solid #6b8f5e;
  }

  /* Success */
  .success-wrap {
    text-align: center;
    padding: 60px 24px;
  }
  .success-icon {
    width: 88px;
    height: 88px;
    background: #e9eee7;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 22px;
    font-size: 44px;
  }
  .success-wrap h2 {
    font-size: 24px;
    color: #4a6741;
    margin-bottom: 12px;
    font-weight: 700;
  }
  .success-wrap p {
    color: #666666;
    font-size: 15px;
    max-width: 420px;
    margin: 0 auto;
  }
</style>
</head>
<body>
<div class="wrap" id="app">

  <!-- ===== HERO ===== -->
  <div class="hero">
    <img class="hero-img" src="https://knzctiuwakvzuoznidod.supabase.co/storage/v1/object/public/form-covers/6169aa8b-6808-4546-a979-f456a000943d/1777888469904.jpg" alt="Bế Giảng HBCompro 2025">
    <div class="hero-overlay">
      <h1>Bế Giảng HBCompro 2025</h1>
      <p>Tổng kết hành trình và chia sẻ giá trị</p>
    </div>
  </div>

  <!-- ===== CONTENT ===== -->
  <div class="content">

    <div class="lead">
      Cảm ơn bạn đã đồng hành cùng HBCompro. Vui lòng đăng ký để giữ chỗ tham gia buổi bế giảng đặc biệt 🌿
    </div>

    <div class="err" id="err"></div>

    <!-- ===== SESSIONS ===== -->
    <section id="sessions">
      <div class="section-title">Chọn buổi tham gia</div>
      <div id="sessionList"></div>
    </section>

    <!-- ===== REGISTER ===== -->
    <section id="register">
      <div class="section-title">Thông tin đăng ký</div>

      <div class="field">
        <label for="name">Họ và tên <span class="req">*</span></label>
        <input type="text" id="name" name="name" placeholder="Ví dụ: Nguyễn Văn An" autocomplete="off" required>
        <div class="ac-list" id="ac-name"></div>
      </div>

      <div class="field">
        <label for="email">Email <span class="req">*</span></label>
        <input type="email" id="email" name="email" placeholder="email@example.com" autocomplete="off" required>
        <div class="ac-list" id="ac-email"></div>
      </div>

      <div class="field">
        <label for="phone">Số điện thoại <span class="req">*</span></label>
        <input type="tel" id="phone" name="phone" placeholder="0987 654 321" autocomplete="off" required>
      </div>

      <label class="check-row" for="commit">
        <input type="checkbox" id="commit">
        <span>Tôi cam kết sắp xếp tham gia đầy đủ buổi đã đăng ký</span>
      </label>

      <button class="btn" id="submitBtn" type="button">Đăng ký tham gia</button>
    </section>

  </div>
</div>

<!-- ===== SUCCESS TEMPLATE ===== -->
<template id="successTpl">
  <div class="wrap">
    <div class="hero">
      <img class="hero-img" src="https://knzctiuwakvzuoznidod.supabase.co/storage/v1/object/public/form-covers/6169aa8b-6808-4546-a979-f456a000943d/1777888469904.jpg" alt="">
    </div>
    <div class="success-wrap">
      <div class="success-icon">🌿</div>
      <h2>Đã ghi nhận đăng ký</h2>
      <p>Cảm ơn bạn đã đăng ký. Bạn sẽ nhận được email xác nhận và link tham gia trước buổi học.</p>
    </div>
  </div>
</template>

<script>
/* ============ CONFIG ============ */
const SUBMIT_URL = 'https://anform.anvui.edu.vn/api/forms/submit/be-giang-hbcompro-2025';
const FORM_SLUG = 'be-giang-hbcompro-2025';

const SESSIONS = [
  { id: 's1777888149187-0', title: 'Buổi 1', date: '2026-05-10', time: '09:00 - 12:00', speaker: 'An Giáo', location: 'Zoom' }
];

const SETTINGS = {
  collectEmail: true,
  collectPhone: true,
  multiSession: true,
  requireCommitment: true
};

/* Database for autocomplete */
const DB = [
  {"tên":"Võ Trần Huỳnh Tụ","email":"qtlethanh.dongxuan@gmail.com","sđt":"935446900"},
  {"tên":"Đỗ Vũ Duy Anh","email":"dovuanhduy@gmail.com","sđt":"986180205"},
  {"tên":"Trần Thị Xuân","email":"thixuantran194@gmail.com","sđt":"335385559"},
  {"tên":"Trầm Vĩnh An (An Yoga)","email":"antramvinh@gmail.com","sđt":"933114916"},
  {"tên":"Nguyễn Thị Diệu Phương","email":"dphuong83@gmail.com","sđt":"947070003"},
  {"tên":"Nguyễn Quốc Toàn","email":"nguyenquoctoan6989@gmail.com","sđt":"794266155"},
  {"tên":"Lê Thị Hệ","email":"lehe1986dpp@gmail.com","sđt":"968771286"},
  {"tên":"Đinh Thu Hiền","email":"docunhatrang2412@gmail.com","sđt":"983410086"},
  {"tên":"Đỗ Thị Hường","email":"dothihuongqtkdb93@gmail.com","sđt":"395767064"},
  {"tên":"Nông Thị Hiền (erina Hiền)","email":"nonghien1993bk@gmail.com","sđt":"962197080"},
  {"tên":"ĐỖ QUỲNH TRANG","email":"leetinhho@gmail.com","sđt":"949428886"},
  {"tên":"Nguyen Hoan","email":"nguyenhoan08021988@gmail.com","sđt":"969226168"},
  {"tên":"Phạm Hải Dương","email":"doanhnhanviet17@gmail.com","sđt":"332128888"},
  {"tên":"Nguyễn thị biên","email":"nguyenbien1608@gmail.com","sđt":"359346299"},
  {"tên":"Thoan Lê","email":"thoanlelethoan@gmail.com","sđt":"973437538"},
  {"tên":"Thảo trần (Úc)","email":"emmatran1905@gmail.com","sđt":"796982714"},
  {"tên":"Vân Anh (Úc)","email":"vutrinhvananh1988@gmail.com","sđt":"779152479"},
  {"tên":"Châu Bảo Vinh","email":"chaubaovinh@gmail.com","sđt":"907172800"},
  {"tên":"Đỗ Ánh Droppii","email":"honganhevaspa@gmail.com","sđt":"899298648"},
  {"tên":"Đặng Nguyễn Minh Đạt","email":"trumdat.official@gmail.com","sđt":"947662682"},
  {"tên":"Tạ Thị Hoa","email":"tahoa809@gmail.com","sđt":"353336667"},
  {"tên":"Ngọc Hạnh","email":"ngochanhvt2512@gmail.com","sđt":"988797286"},
  {"tên":"Phú Tâm","email":"tamphu8691@gmail.com","sđt":"988797286"},
  {"tên":"Ngô Thị Hạnh","email":"huyhuandasuka@gmail.com","sđt":"376400236"}
];

/* ============ ANTI-ZOOM ============ */
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
let lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) e.preventDefault();
  lastTap = now;
}, { passive: false });

/* ============ RENDER SESSIONS ============ */
const sessionList = document.getElementById('sessionList');
const selectedSessions = new Set();

function fmtDate(d) {
  try {
    const dt = new Date(d);
    const days = ['CN','T2','T3','T4','T5','T6','T7'];
    return `${days[dt.getDay()]}, ${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
  } catch { return d; }
}

SESSIONS.forEach(s => {
  const el = document.createElement('div');
  el.className = 'session-card';
  el.dataset.id = s.id;
  el.innerHTML = `
    <div class="session-check"></div>
    <div class="session-info">
      <span class="session-badge">${s.title}</span>
      <div class="session-title">${s.speaker || ''}</div>
      <div class="session-meta">
        <span>📅 ${fmtDate(s.date)}</span>
        <span>🕘 ${s.time}</span>
        <span>📍 ${s.location}</span>
      </div>
    </div>`;
  el.addEventListener('click', () => {
    if (!SETTINGS.multiSession) {
      selectedSessions.clear();
      document.querySelectorAll('.session-card').forEach(c => c.classList.remove('active'));
    }
    if (selectedSessions.has(s.id)) {
      selectedSessions.delete(s.id);
      el.classList.remove('active');
    } else {
      selectedSessions.add(s.id);
      el.classList.add('active');
    }
  });
  sessionList.appendChild(el);
});

// Auto-select if only 1 session
if (SESSIONS.length === 1) {
  selectedSessions.add(SESSIONS[0].id);
  sessionList.firstElementChild.classList.add('active');
}

/* ============ AUTOCOMPLETE ============ */
function setupAC(inputId, listId, field) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (q.length < 2) { list.classList.remove('show'); return; }
    const matches = DB.filter(r => {
      const v = (r[field] || '').toString().toLowerCase();
      return v.includes(q);
    }).slice(0, 6);
    if (!matches.length) { list.classList.remove('show'); return; }
    list.innerHTML = matches.map(m => `
      <div class="ac-item" data-name="${escapeHtml(m['tên'])}" data-email="${escapeHtml(m.email)}" data-phone="${escapeHtml(m['sđt'])}">
        <strong>${escapeHtml(m['tên'])}</strong>
        <small>${escapeHtml(m.email)} · ${escapeHtml(m['sđt'])}</small>
      </div>`).join('');
    list.classList.add('show');
    list.querySelectorAll('.ac-item').forEach(it => {
      it.addEventListener('click', () => {
        document.getElementById('name').value = it.dataset.name;
        document.getElementById('email').value = it.dataset.email;
        document.getElementById('phone').value = it.dataset.phone;
        list.classList.remove('show');
      });
    });
  });

  input.addEventListener('blur', () => setTimeout(() => list.classList.remove('show'), 200));
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

setupAC('name', 'ac-name', 'tên');
setupAC('email', 'ac-email', 'email');

/* ============ VALIDATE & SUBMIT ============ */
const errBox = document.getElementById('err');
const btn = document.getElementById('submitBtn');

function showErr(msg) {
  errBox.textContent = msg;
  errBox.classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function clearErr() { errBox.classList.remove('show'); }

btn.addEventListener('click', async () => {
  clearErr();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const commit = document.getElementById('commit').checked;

  if (!name) return showErr('Vui lòng nhập họ và tên.');
  if (SETTINGS.collectEmail && !email) return showErr('Vui lòng nhập email.');
  if (SETTINGS.collectEmail && email && !/^\S+@\S+\.\S+$/.test(email)) return showErr('Email không hợp lệ.');
  if (SETTINGS.collectPhone && !phone) return showErr('Vui lòng nhập số điện thoại.');
  if (SETTINGS.collectPhone && phone && !/^[0-9+\s().-]{8,}$/.test(phone)) return showErr('Số điện thoại không hợp lệ.');
  if (SESSIONS.length > 0 && selectedSessions.size === 0) return showErr('Vui lòng chọn ít nhất 1 buổi tham gia.');
  if (SETTINGS.requireCommitment && !commit) return showErr('Vui lòng xác nhận cam kết tham gia.');

  btn.disabled = true;
  btn.textContent = 'Đang gửi...';

  const sessionIds = Array.from(selectedSessions);
  const sessionTitles = SESSIONS.filter(s => selectedSessions.has(s.id)).map(s => s.title);

  const payload = {
    timestamp: new Date().toISOString(),
    name, email, phone,
    klass: '',
    sessions: sessionTitles,
    sessionIds: sessionIds,
    formSlug: FORM_SLUG,
    meta: {
      commitment: commit,
      ua: navigator.userAgent,
      lang: navigator.language
    }
  };

  try {
    const res = await fetch(SUBMIT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const data = await res.json().catch(() => ({ ok: res.ok }));
    if (data.ok === false) throw new Error(data.error || 'Submit failed');
    showSuccess();
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Đăng ký tham gia';
    showErr('Có lỗi xảy ra, vui lòng thử lại. (' + (err.message || 'network') + ')');
  }
});

function showSuccess() {
  const tpl = document.getElementById('successTpl');
  const app = document.getElementById('app');
  app.replaceWith(tpl.content.cloneNode(true));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
